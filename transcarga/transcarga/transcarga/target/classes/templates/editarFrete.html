<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Frete | TransCarga</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<header class="topbar">
    <div class="logo">
        <div class="logo-icon-wrap">
            <svg viewBox="0 0 24 24" fill="white" width="20" height="20">
                <path d="M20 8h-3V4H3c-1.1 0-2 .9-2 2v11h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4zM6 18.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm13.5-9l1.96 2.5H17V9.5h2.5zm-1.5 9c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/>
            </svg>
        </div>
        <div>
            <div class="logo-name">TransCarga</div>
            <div class="logo-sub">Sistema de Gerenciamento de Fretes</div>
        </div>
    </div>
    <nav class="nav">
        <a th:href="@{/inicio}">Início</a>
        <a th:href="@{/fretes/cadastrar}">Cadastrar Frete</a>
        <a th:href="@{/fretes/listar}" class="active">Listar Fretes</a>
    </nav>
</header>

<main class="container">
    <div class="page-header">
        <h1>Editar Frete <span th:text="'#' + ${frete.id}" class="muted"></span></h1>
        <p>Altere os dados do frete e salve</p>
    </div>

    <div class="card form-card">
        <form th:action="@{/fretes/editar/{id}(id=${frete.id})}" th:object="${frete}"
              method="post" accept-charset="UTF-8">

            <!-- Destino -->
            <div class="form-group" th:classappend="${#fields.hasErrors('destino')} ? 'has-error'">
                <label for="destino" class="form-label">Destino</label>
                <input type="text"
                       id="destino"
                       th:field="*{destino}"
                       class="form-input"
                       placeholder="Ex: São Paulo, SP"
                       required />
                <span class="form-error" th:if="${#fields.hasErrors('destino')}"
                      th:errors="*{destino}">Erro</span>
            </div>

            <!-- Peso e Status -->
            <div class="form-row">
                <div class="form-group" th:classappend="${#fields.hasErrors('peso')} ? 'has-error'">
                    <label for="peso" class="form-label">Peso (kg)</label>
                    <input type="number"
                           id="peso"
                           th:field="*{peso}"
                           class="form-input"
                           step="0.1"
                           min="0.1"
                           required />
                    <span class="form-error" th:if="${#fields.hasErrors('peso')}"
                          th:errors="*{peso}">Erro</span>
                </div>

                <div class="form-group">
                    <label for="status" class="form-label">Status</label>
                    <select id="status" th:field="*{status}" class="form-input">
                        <option th:each="s : ${statusList}"
                                th:value="${s}"
                                th:text="${s.descricao}">
                        </option>
                    </select>
                </div>
            </div>

            <!-- Transportadora -->
            <div class="form-group" th:classappend="${#fields.hasErrors('transportadora')} ? 'has-error'">
                <label for="transportadora" class="form-label">Transportadora</label>
                <input type="text"
                       id="transportadora"
                       th:field="*{transportadora}"
                       class="form-input"
                       placeholder="Ex: Rápido Frete Ltda"
                       required />
                <span class="form-error" th:if="${#fields.hasErrors('transportadora')}"
                      th:errors="*{transportadora}">Erro</span>
            </div>

            <!-- Botões -->
            <div class="form-actions">
                <a th:href="@{/fretes/listar}" class="btn btn-secondary">Cancelar</a>
                <button type="submit" class="btn btn-primary">Salvar Alterações</button>
            </div>
        </form>
    </div>
</main>

<footer class="footer">
    <span>TransCarga &copy; 2026 &mdash; Arquitetura MVC com Spring Boot + JPA + MariaDB</span>
</footer>

</body>
</html>
