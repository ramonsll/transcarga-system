# ============================================================
# Perfil MariaDB - Banco de Dados Real
# Para ativar: altere spring.profiles.active=mariadb
#              no arquivo application.properties
# ============================================================

# Datasource MariaDB
spring.datasource.url=jdbc:mariadb://localhost:3306/transcargadb?useUnicode=true&characterEncoding=UTF-8&serverTimezone=America/Sao_Paulo
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=1234

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ============================================================
# INSTRUÇÕES PARA CRIAR O BANCO NO MARIADB:
#
# CREATE DATABASE transcargadb CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
# GRANT ALL PRIVILEGES ON transcargadb.* TO 'root'@'localhost';
# FLUSH PRIVILEGES;
# ============================================================
