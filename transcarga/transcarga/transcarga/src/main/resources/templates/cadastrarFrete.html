<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Frete | TransCarga</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<!-- Estrutura Principal de Vidro -->
<div class="app-window">

    <!-- Header / Menu Superior -->
    <header class="topbar">
        <div class="logo">
            <div class="logo-icon-wrap">
                <svg viewBox="0 0 24 24" fill="white" width="20" height="20">
                    <path d="M20 8h-3V4H3c-1.1 0-2 .9-2 2v11h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4zM6 18.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm13.5-9l1.96 2.5H17V9.5h2.5zm-1.5 9c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/>
                </svg>
            </div>
            <div>
                <div class="logo-name">TransCarga</div>
                <div class="logo-sub">Sistema de Gerenciamento de Fretes</div>
            </div>
        </div>
        <nav class="nav">
            <a th:href="@{/inicio}">Início</a>
            <a th:href="@{/fretes/cadastrar}" class="active">Cadastrar Frete</a>
            <a th:href="@{/fretes/listar}">Listar Fretes</a>
        </nav>
    </header>

    <!-- Área Central com Scroll -->
    <main class="container">
        <div class="page-header">
            <h1>Cadastrar Frete</h1>
            <p>Preencha os dados para registrar um novo transporte no sistema</p>
        </div>

        <!-- Card do Formulário com Glassmorphism -->
        <div class="card form-card">
            <form th:action="@{/fretes/cadastrar}" th:object="${frete}" method="post" accept-charset="UTF-8">

                <!-- Destino -->
                <div class="form-group" th:classappend="${#fields.hasErrors('destino')} ? 'has-error'">
                    <label for="destino" class="form-label">Destino</label>
                    <input type="text"
                           id="destino"
                           th:field="*{destino}"
                           class="form-input"
                           placeholder="Ex: São Paulo, SP"
                           required />
                    <span class="form-error" th:if="${#fields.hasErrors('destino')}"
                          th:errors="*{destino}">Erro de validação</span>
                </div>

                <!-- Peso e Status lado a lado -->
                <div class="form-row">
                    <div class="form-group" th:classappend="${#fields.hasErrors('peso')} ? 'has-error'">
                        <label for="peso" class="form-label">Peso (kg)</label>
                        <input type="number"
                               id="peso"
                               th:field="*{peso}"
                               class="form-input"
                               placeholder="Ex: 350"
                               step="0.1"
                               min="0.1"
                               required />
                        <span class="form-error" th:if="${#fields.hasErrors('peso')}"
                              th:errors="*{peso}">Erro de peso</span>
                    </div>

                    <div class="form-group">
                        <label for="status" class="form-label">Status Inicial</label>
                        <select id="status" th:field="*{status}" class="form-input">
                            <option th:each="s : ${statusList}"
                                    th:value="${s}"
                                    th:text="${s.descricao}">
                            </option>
                        </select>
                    </div>
                </div>

                <!-- Transportadora -->
                <div class="form-group" th:classappend="${#fields.hasErrors('transportadora')} ? 'has-error'">
                    <label for="transportadora" class="form-label">Transportadora</label>
                    <input type="text"
                           id="transportadora"
                           th:field="*{transportadora}"
                           class="form-input"
                           placeholder="Ex: Rápido Frete Ltda"
                           required />
                    <span class="form-error" th:if="${#fields.hasErrors('transportadora')}"
                          th:errors="*{transportadora}">Erro de transportadora</span>
                </div>

                <!-- Ações -->
                <div class="form-actions">
                    <a th:href="@{/inicio}" class="btn btn-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-primary">
                        <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16" style="margin-right: 4px;">
                            <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/>
                        </svg>
                        Confirmar Cadastro
                    </button>
                </div>
            </form>
        </div>
    </main>

    <!-- Rodapé Interno -->
    <footer class="footer">
        <span>TransCarga &copy; 2026 &mdash; Mossoró, RN</span>
    </footer>

</div> <!-- Fim app-window -->

</body>
</html>
