<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(content, activePage, pageTitle)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' | TransCarga'">TransCarga</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<!-- A 'janela' de vidro centralizada que sustenta todo o app -->
<div class="app-window">

    <header class="topbar">
        <div class="logo">
            <div class="logo-icon-wrap">
                <svg viewBox="0 0 24 24" fill="white" width="20" height="20">
                    <path d="M20 8h-3V4H3c-1.1 0-2 .9-2 2v11h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4zM6 18.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm13.5-9l1.96 2.5H17V9.5h2.5zm-1.5 9c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/>
                </svg>
            </div>
            <div>
                <div class="logo-name">TransCarga</div>
                <div class="logo-sub">Sistema de Gerenciamento de Fretes</div>
            </div>
        </div>
        <nav class="nav">
            <a th:href="@{/}" th:classappend="${activePage == 'home'} ? 'active'">Início</a>
            <a th:href="@{/fretes/cadastrar}" th:classappend="${activePage == 'cadastrar'} ? 'active'">Cadastrar Frete</a>
            <a th:href="@{/fretes/listar}" th:classappend="${activePage == 'listar'} ? 'active'">Listar Fretes</a>
        </nav>
    </header>

    <!-- O container agora recebe o fragmento de conteúdo dinamicamente -->
    <main class="container">
        <div th:replace="${content}">
            <!-- O conteúdo de cada página (Home, Listagem, etc) entra aqui -->
        </div>
    </main>

    <footer class="footer">
        <span>TransCarga &copy; 2026 &mdash; Mossoró, RN</span>
    </footer>

</div> <!-- Fim app-window -->

</body>
</html>
