spring.application.name=TransCarga
server.port=8080
server.servlet.context-path=/transcarga
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

# Banco MariaDB
spring.datasource.url=jdbc:mariadb://localhost:3306/transcargadb?useUnicode=true&characterEncoding=UTF-8&serverTimezone=America/Sao_Paulo
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.username=transcarga
spring.datasource.password=1234
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false